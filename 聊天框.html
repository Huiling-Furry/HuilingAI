<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>灰澪AI · 星夜对话</title>
    <link rel="icon" type="image/webp" href="https://img.cdn1.vip/i/69ffd42d68f55_1778373677.webp">
    <style>
        html {
     zoom: 0.96;
     }  
         /* 修复聊天窗口不被内容撑开 */
         .chat-window {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
         }

         /* 消息区域自动滚动 */
         .messages-area {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
         }
        
         /* 美化滚动条 */
         .conv-list::-webkit-scrollbar,
         .messages-area::-webkit-scrollbar {
            width: 6px;
         }
         .conv-list::-webkit-scrollbar-thumb,
         .messages-area::-webkit-scrollbar-thumb {
            background: rgba(59,156,219,0.35);
            border-radius: 10px;
         }
         .conv-list::-webkit-scrollbar-track,
         .messages-area::-webkit-scrollbar-track {
            background: transparent;
         }
         .conv-list::-webkit-scrollbar-thumb:hover,
         .messages-area::-webkit-scrollbar-thumb:hover {
            background: rgba(59,156,219,0.55);
         }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --glass-bg-light: rgba(255, 255, 255, 0.55);
            --glass-bg-dark: rgba(20, 24, 35, 0.6);
            --border-light: rgba(255, 255, 255, 0.5);
            --accent: #3b9cdb;
            --modal-bg-light: #ffffff;
            --modal-bg-dark: #1a1f2e;
            --modal-text-light: #1e2a32;
            --modal-text-dark: #eef;
            --modal-input-bg-light: #f5f7fa;
            --modal-input-bg-dark: #252b3a;
            --danger: #e06c75;
        }
        
        body.light-mode {
            --modal-bg: var(--modal-bg-light);
            --modal-text: var(--modal-text-light);
            --modal-input-bg: var(--modal-input-bg-light);
            --modal-border: #e8ecf0;
            --modal-header-bg: #fafbfc;
            --btn-secondary-bg: #f0f2f5;
            --btn-secondary-text: #333;
            --text-primary: #1e2a32;
            --text-secondary: #5a6e7c;
        }
        
        body.dark {
            --glass-bg-light: rgba(20, 24, 35, 0.7);
            --border-light: rgba(72, 80, 100, 0.4);
            --modal-bg: var(--modal-bg-dark);
            --modal-text: var(--modal-text-dark);
            --modal-input-bg: var(--modal-input-bg-dark);
            --modal-border: #2f3545;
            --modal-header-bg: #1e2433;
            --btn-secondary-bg: #2a2f3e;
            --btn-secondary-text: #ccc;
            --text-primary: #f0f3f8;
            --text-secondary: #a0b3c4;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: url('https://img.cdn1.vip/i/69f97942d3254_1777957186.webp') no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
            color: var(--text-primary);
            transition: color 0.2s;
        }
        
        @media (max-width: 767px) {
            body { background: url('https://img.cdn1.vip/i/69f97a79be470_1777957497.webp') no-repeat center center fixed; background-size: cover; }
            .app-layout { padding: 12px; }
            .chat-window { width: 100%; }
        }
        
        .app-layout { display: flex; width: 100%; min-height: 100vh; position: relative; padding: 16px; gap: 12px; }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: var(--glass-bg-light);
            backdrop-filter: blur(20px);
            border-radius: 0 28px 28px 0;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 2px 0 20px rgba(0,0,0,0.15);
            border-right: 1px solid var(--border-light);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
        }
        .sidebar.open { transform: translateX(0); }
        body.dark .sidebar { background: var(--glass-bg-dark); }
        
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s ease;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        
        .chat-window {
            flex: 1;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,240,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: calc(100vh - 32px);
            position: relative;
            z-index: 1;
        }
        body.dark .chat-window { background: rgba(25,30,42,0.55); }
        
        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                transform: translateX(0);
                width: 260px;
                height: auto;
                border-radius: 28px;
                flex-shrink: 0;
                margin: 0;
            }
            .sidebar-overlay { display: none; }
        }
        
        .new-chat-btn { background: white; border: none; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; color: #1f3f5c; }
        .new-chat-btn:hover { transform: translateY(-2px); background: #f5faff; }
        body.dark .new-chat-btn { background: #2f3545; color: #eef; }
        
        .upload-options { display: none; }
        
        .conv-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .conv-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-radius: 24px; background: rgba(255,255,240,0.2); cursor: pointer; transition: 0.2s; color: var(--text-primary); }
        .conv-item.active { background: rgba(59,156,219,0.25); border-left: 3px solid var(--accent); }
        .conv-name { font-weight: 500; font-size: 0.9rem; flex: 1; }
        .conv-more { font-size: 1.2rem; opacity: 0.6; cursor: pointer; padding: 0 8px; }
        .dropdown-menu {
            position: fixed; background: white; backdrop-filter: blur(12px); border-radius: 20px;
            padding: 8px 0; min-width: 150px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeScale 0.2s ease; z-index: 2000; border: 1px solid rgba(0,0,0,0.05);
        }
        body.dark .dropdown-menu { background: #252b3a; color: #eef; }
        .dropdown-item { padding: 10px 18px; cursor: pointer; font-size: 0.85rem; transition: 0.1s; }
        .dropdown-item:hover { background: rgba(59,156,219,0.2); }
        .dropdown-item.danger { color: #e06c75; }
        .user-info { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 12px; }
        
        .user-avatar { 
            width: 44px; 
            height: 44px; 
            background-size: cover; 
            background-position: center;
            border-radius: 50%; 
            background-image: var(--user-avatar-url, url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="45" r="28" fill="%23d9eaff"/><circle cx="38" cy="40" r="3" fill="%233d5a80"/><circle cx="62" cy="40" r="3" fill="%233d5a80"/><path d="M45 58 Q50 64 55 58" stroke="%23688aa8" stroke-width="2" fill="none"/><polygon points="35,28 40,23 38,32" fill="%23f5c6d0"/><polygon points="65,28 60,23 62,32" fill="%23f5c6d0"/></svg>')); 
        }
        .chat-header .user-avatar { width: 40px; height: 40px; }
        
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .header-title { display: flex; align-items: center; gap: 12px; flex: 1; }
        .header-info { flex: 1; }
        .chat-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .chat-title-row strong { font-size: 1.1rem; }
        .style-edit-btn { background: none; border: none; font-size: 0.85rem; cursor: pointer; color: var(--text-secondary); padding: 4px 8px; border-radius: 20px; transition: background 0.2s; }
        .style-edit-btn:hover { background: rgba(128,128,128,0.2); }
        .status { font-size: 0.7rem; background: #4cd964; padding: 2px 8px; border-radius: 20px; color: white; display: inline-block; }
        .func-tag { font-size: 0.7rem; color: var(--text-secondary); margin-left: 8px; cursor: pointer; }
        
        /* 聊天消息区域 - 固定高度，滚动 */
        .messages-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 24px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px;
            min-height: 0;
        }
        
        .message-item { display: flex; width: 100%; animation: fadeUp 0.25s ease; align-items: flex-start; }
        .message-item.user { justify-content: flex-end; }
        .message-item.assistant { justify-content: flex-start; gap: 12px; }
        
        .ai-avatar {
            width: 38px;
            height: 38px;
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            background-image: url('https://img.cdn1.vip/i/69f97ad32f7b7_1777957587.webp');
            flex-shrink: 0;
            cursor: pointer;
        }
        
        .message-bubble { 
            max-width: 70%; 
            padding: 10px 16px; 
            border-radius: 20px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
            word-break: break-word; 
            line-height: 1.45;
        }
        .assistant .message-bubble { background: white; border-top-left-radius: 4px; color: #1e2a32; }
        .user .message-bubble { background: #3b9cdb; color: white; border-top-right-radius: 4px; }
        body.dark .assistant .message-bubble { background: #2f3548; color: #f0f3fc; }
        
        .time-stamp { font-size: 0.6rem; color: var(--text-secondary); margin-top: 4px; text-align: center; }
        
        /* 文件消息卡片样式 - 简洁美观 */
        .file-card {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.05);
            padding: 8px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s;
            max-width: 280px;
        }
        .file-card:hover { background: rgba(0,0,0,0.1); }
        .file-icon { font-size: 1.5rem; }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-size { font-size: 0.7rem; opacity: 0.7; }
        .user .file-card { background: rgba(255,255,255,0.2); }
        .user .file-card:hover { background: rgba(255,255,255,0.3); }
        
        .image-preview-card {
            display: inline-block;
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden;
            max-width: 200px;
        }
        .image-preview-card img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            transition: transform 0.2s;
        }
        .image-preview-card img:hover { transform: scale(1.02); }
        
        .thinking-bubble { background: rgba(255,255,240,0.8); padding: 12px 20px; border-radius: 28px; display: inline-flex; align-items: center; gap: 6px; color: #1e2a32; }
        body.dark .thinking-bubble { background: rgba(30,35,50,0.8); color: #eef; }
        .dot-floating span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #6b8faa; margin: 0 2px; animation: wave 1.2s infinite ease-in-out; }
        .dot-floating span:nth-child(2) { animation-delay: 0.2s; }
        .dot-floating span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
        
        .input-area { padding: 16px 24px 24px; background: rgba(0,0,0,0.02); border-top: 1px solid rgba(0,0,0,0.03); position: relative; flex-shrink: 0; }
        .input-group { display: flex; gap: 12px; align-items: center; }
        .attach-btn { background: var(--accent); border: none; width: 48px; height: 48px; border-radius: 50%; color: white; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.1s; }
        .attach-btn:active { transform: scale(0.94); }
        .chat-input { flex: 1; padding: 14px 20px; border: 1px solid rgba(0,0,0,0.1); border-radius: 60px; font-size: 1rem; background: rgba(255,255,255,0.7); outline: none; color: var(--text-primary); }
        .chat-input:focus { border-color: var(--accent); }
        .chat-input::placeholder { color: var(--text-secondary); }
        .send-btn { background: var(--accent); border: none; padding: 0 26px; border-radius: 60px; color: white; font-weight: bold; cursor: pointer; transition: 0.1s; height: 48px; font-size: 1rem; }
        .send-btn:active { transform: scale(0.96); }
        @media (max-width: 767px) { .send-btn { display: none; } }
        .footer-note-chat { font-size: 0.65rem; text-align: center; margin-top: 12px; color: var(--text-secondary); }
        
        .attach-menu { position: absolute; bottom: 85px; left: 30px; background: var(--modal-bg); backdrop-filter: blur(20px); border-radius: 28px; padding: 8px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 200; min-width: 170px; display: none; flex-direction: column; border: 1px solid var(--border-light); animation: fadeScale 0.2s ease; }
        .attach-menu.active { display: flex; }
        .attach-menu button { background: transparent; border: none; color: var(--modal-text); text-align: left; padding: 14px 20px; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .attach-menu button:hover { background: rgba(128,128,128,0.1); }
        
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-container {
            background: var(--modal-bg);
            border-radius: 32px;
            width: 500px;
            max-width: 92vw;
            color: var(--modal-text);
            transform: scale(0.96);
            transition: transform 0.25s cubic-bezier(0.2,0.9,0.4,1.1);
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            max-height: 85vh;
        }
        .modal-overlay.active .modal-container { transform: scale(1); }
        
        @media (max-width: 767px) {
            .modal-container.fullscreen-modal {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                max-width: 100%;
                border-radius: 0;
                transform: translateY(0);
                max-height: 100vh;
            }
            .modal-overlay.active .modal-container.fullscreen-modal { transform: translateY(0); }
            .settings-tabs { position: sticky; top: 0; background: var(--modal-bg); z-index: 10; padding: 12px 16px; margin-bottom: 0; }
        }
        
        .modal-header { padding: 18px 24px; border-bottom: 1px solid var(--modal-border); background: var(--modal-header-bg); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .modal-header h2 { font-size: 1.2rem; font-weight: 600; margin: 0; }
        .modal-header .close-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; font-size: 1.5rem; line-height: 1; }
        .modal-header .close-btn:hover { background: rgba(128,128,128,0.2); }
        .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 16px 24px; display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--modal-border); background: var(--modal-header-bg); flex-shrink: 0; }
        @media (max-width: 767px) { .modal-footer { justify-content: center; padding: 20px 24px; position: sticky; bottom: 0; background: var(--modal-header-bg); } .modal-footer .modal-btn { width: 100%; max-width: 200px; } }
        .modal-btn { padding: 10px 24px; border-radius: 40px; border: none; font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
        .modal-btn.primary { background: var(--accent); color: white; }
        .modal-btn.secondary { background: var(--btn-secondary-bg); color: var(--btn-secondary-text); }
        .modal-input { width: 100%; padding: 12px 16px; background: var(--modal-input-bg); border: 1px solid var(--modal-border); border-radius: 20px; color: var(--modal-text); font-size: 0.9rem; outline: none; }
        .modal-textarea { width: 100%; padding: 16px; background: var(--modal-input-bg); border: 1px solid var(--modal-border); border-radius: 20px; color: var(--modal-text); font-size: 0.95rem; outline: none; resize: vertical; min-height: 150px; font-family: inherit; line-height: 1.5; }
        
        .form-row { margin-bottom: 16px; }
        .form-row label { display: block; font-size: 0.8rem; margin-bottom: 6px; opacity: 0.7; }
        .row-2 { display: flex; gap: 12px; }
        .row-2 .form-row { flex: 1; }
        .profile-avatar { display: flex; justify-content: center; margin-bottom: 20px; }
        .avatar-edit { position: relative; width: 80px; height: 80px; border-radius: 50%; overflow: hidden; cursor: pointer; border: 3px solid var(--accent); }
        .avatar-edit img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-edit .avatar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .avatar-edit:hover .avatar-overlay { opacity: 1; }
        .contact-item { margin-bottom: 12px; padding: 10px 0; border-bottom: 1px solid var(--modal-border); display: flex; align-items: center; gap: 12px; }
        .contact-item .label { font-weight: 600; width: 70px; }
        .contact-item .value { flex: 1; }
        
        .settings-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px; border-bottom: 1px solid var(--modal-border); flex-shrink: 0; background: var(--modal-bg); }
        .settings-tab { padding: 8px 18px; border-radius: 40px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; background: transparent; color: var(--modal-text); transition: all 0.2s; }
        .settings-tab.active { background: var(--accent); color: white; }
        .settings-sidebar { width: 140px; flex-shrink: 0; border-right: 1px solid var(--modal-border); padding-right: 16px; }
        .settings-sidebar .nav-item { padding: 10px 14px; border-radius: 16px; cursor: pointer; margin-bottom: 6px; transition: all 0.2s; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .settings-sidebar .nav-item.active { background: var(--accent); color: white; }
        .settings-content { flex: 1; padding-left: 20px; }
        .setting-section { margin-bottom: 28px; }
        .setting-section h3 { font-size: 0.95rem; margin-bottom: 12px; font-weight: 600; border-left: 3px solid var(--accent); padding-left: 10px; }
        .theme-options { display: flex; gap: 12px; flex-wrap: wrap; }
        .theme-option { flex: 1; min-width: 90px; padding: 10px; background: var(--modal-input-bg); border: 1px solid var(--modal-border); border-radius: 20px; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.85rem; }
        .theme-option.active { background: var(--accent); border-color: var(--accent); color: white; }
        .info-card { background: var(--modal-input-bg); border-radius: 20px; padding: 16px; cursor: pointer; transition: opacity 0.2s; }
        .info-card.clickable:hover { opacity: 0.8; }
        .danger-btn { background: rgba(224,108,117,0.2); color: #e06c75; border: 1px solid rgba(224,108,117,0.3); margin-top: 12px; width: 100%; padding: 12px; border-radius: 40px; cursor: pointer; }
        .export-btn { background: var(--accent); color: white; border: none; margin-top: 12px; width: 100%; padding: 12px; border-radius: 40px; cursor: pointer; }
        .secondary-btn { background: var(--btn-secondary-bg); color: var(--btn-secondary-text); border: none; margin-top: 12px; width: 100%; padding: 12px; border-radius: 40px; cursor: pointer; }
        .switch-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--modal-border); }
        .switch { width: 52px; height: 28px; background: #a0aec0; border-radius: 40px; position: relative; display: inline-block; transition: 0.2s; cursor: pointer; }
        .switch.active { background: var(--accent); }
        .switch::after { content: ""; width: 24px; height: 24px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.2s; }
        .switch.active::after { left: 25px; }
        .hint-text { font-size: 0.7rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.4; }
        
        @keyframes fadeScale { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .swipe-hint { display: none; }
        @media (max-width: 767px) {
            .swipe-hint { display: flex; position: fixed; bottom: 20px; left: 10px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 6px 12px; border-radius: 30px; font-size: 0.7rem; color: white; z-index: 100; pointer-events: none; gap: 6px; align-items: center; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <button class="new-chat-btn" id="newChatBtn">新建对话</button>
        <div class="upload-options">
            <div class="upload-item" id="uploadImgTrigger">上传图片</div>
            <div class="upload-item" id="uploadFileTrigger">上传文件</div>
        </div>

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    
    async function uploadFile(file, type) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                setTimeout(() => {
                    resolve({
                        success: true,
                        url: e.target.result,
                        name: file.name,
                        size: formatFileSize(file.size),
                        type: type
                    });
                }, 300);
            };
            reader.onerror = () => reject(new Error('读取文件失败'));
            reader.readAsDataURL(file);
        });
    }
    
    // 生成简洁的文件消息HTML
    function getFileMessageHTML(fileData) {
        if (fileData.type === 'image') {
            return `<div class="image-preview-card" onclick="window.open('${fileData.url}')"><img src="${fileData.url}" alt="${escapeHtml(fileData.name)}" loading="lazy"></div>`;
        } else {
            return `<div class="file-card" onclick="window.open('${fileData.url}')">
                        <div class="file-icon">📄</div>
                        <div class="file-info">
                            <div class="file-name">${escapeHtml(fileData.name)}</div>
                            <div class="file-size">${fileData.size}</div>
                        </div>
                        <div>🔗</div>
                    </div>`;
        }
    }
    
    async function handleFileUpload(type) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = type === 'image' ? 'image/*' : '*/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            showToast(`${t('uploading')} ${file.name}`);
            
            try {
                const result = await uploadFile(file, type);
                if (result.success) {
                    const fileHTML = getFileMessageHTML(result);
                    const fileMessage = `[上传文件]\n${fileHTML}`;
                    
                    currentMessages.push({ role: "user", content: fileMessage, isFile: true, fileData: result });

                    showToast(`${t('uploadSuccess')}: ${result.name}`);
                }

                showToast(`${t('uploadFailed')}: ${error.message}`, true);
            }
        };
        input.click();
    }

    // 发送消息给AI
    async function sendMessageToAI(text) {
        if (!text.trim()) return;
        
        if (memoryEnabled) {
            if (!userMemory[userProfile.nickname]) {
                userMemory[userProfile.nickname] = [];
            }
            userMemory[userProfile.nickname].push({
                time: new Date().toISOString(),
                message: text.substring(0, 100)
            });
            if (userMemory[userProfile.nickname].length > 10) {
                userMemory[userProfile.nickname].shift();
            }
            localStorage.setItem('user_memory', JSON.stringify(userMemory));
        }
        
        currentMessages.push({ role: "user", content: text });
        renderMessages();
        const thinkId = "think_" + Date.now();
        const area = document.getElementById('messagesArea');
        const tpl = document.createElement('div');
        tpl.className = "message-item assistant";
        tpl.id = thinkId;
        tpl.innerHTML = `<div class="ai-avatar" style="background-image: url('${userProfile.aiAvatar}'); background-size: cover;"></div><div class="thinking-bubble dot-floating"><span></span><span></span><span></span> ${t('thinking')}</div>`;
        area.appendChild(tpl);
        area.scrollTop = area.scrollHeight;
        try {
            const userName = userProfile.nickname || "旅行者";
            const historyMsgs = currentMessages.filter(m => m.role !== "system").slice(-10);
            const apiMessages = [
                { role: "system", content: `${roleStyleDesc} 用户叫${userName}。` },
                ...historyMsgs
            ];
            const response = await fetch(BASE_URL, {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: MODEL_NAME, messages: apiMessages })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const reply = data.choices[0].message.content;
            document.getElementById(thinkId)?.remove();
            currentMessages.push({ role: "assistant", content: reply });
            conversations[currentConversationId].messages = [...currentMessages];
            renderMessages();
        } catch (error) {
            document.getElementById(thinkId)?.remove();
            const fallback = `🐾 诶呀，网络有点小波动～ ${userProfile.nickname} 再试一次好不好？`;
            currentMessages.push({ role: "assistant", content: fallback });
            conversations[currentConversationId].messages = [...currentMessages];
            renderMessages();
            showToast("连接失败，请检查网络", true);
        }
    }

    function switchConv(id) {
        conversations[currentConversationId].messages = [...currentMessages];
        currentConversationId = id;
        currentMessages = conversations[id].messages;
        document.getElementById('chatTitle').innerText = conversations[id].name;
        document.getElementById('funcTagLabel').innerText = conversations[id].style || t('writing');
        renderMessages();
        renderConvList();
        saveConversations();
    }
    
    function showConvMenu(e, cid) {
        document.querySelectorAll('.dropdown-menu').forEach(x => x.remove());
        const m = document.createElement('div');
        m.className = "dropdown-menu";
        m.innerHTML = `<div class="dropdown-item" act="rename">✏️ ${t('rename')}</div><div class="dropdown-item danger" act="del">🗑️ ${t('deleteChat')}</div>`;
        document.body.appendChild(m);
        const r = e.target.getBoundingClientRect();
        let left = r.left, top = r.bottom + 6;
        if (left + 160 > window.innerWidth) left = window.innerWidth - 170;
        if (top + 120 > window.innerHeight) top = r.top - 100;
        m.style.left = left + "px";
        m.style.top = top + "px";
        
        const closeMenu = () => m.remove();
        
        m.querySelectorAll('.dropdown-item').forEach(it => {
            it.onclick = () => {
                if (it.getAttribute("act") === "rename") {
                    closeMenu();
                    showCustomPrompt(t('rename'), t('rename'), conversations[cid].name, (newName) => {
                        if (newName && newName.trim()) {
                            conversations[cid].name = newName.trim();
                            if (currentConversationId === cid) document.getElementById('chatTitle').innerText = newName;
                            renderConvList();
                            saveConversations();
                            showToast(t('rename'));
                        }
                    });
                } else if (it.getAttribute("act") === "del") {
                    closeMenu();
                    const convCount = Object.keys(conversations).length;
                    if (convCount <= 1) {
                        showToast(t('atLeastOne'));
                        return;
                    }
                    showCustomConfirm(t('deleteChat'), `确定删除对话“${conversations[cid].name}”吗？`, () => {
                        const isCurrent = (currentConversationId === cid);
                        delete conversations[cid];
                        if (isCurrent) {
                            const remainingIds = Object.keys(conversations);
                            if (remainingIds.length > 0) {
                                switchConv(remainingIds[0]);
                            } else {
                                initDefault();
                            }
                        } else {
                            renderConvList();
                        }
                        saveConversations();
                        showToast(t('deleteChat'));
                    });
                }
            };
        });
        
        setTimeout(() => {
            const clickOutside = (ev) => {
                if (!m.contains(ev.target)) {
                    m.remove();
                    document.removeEventListener("click", clickOutside);
                }
            };
            document.addEventListener("click", clickOutside);
        }, 10);
    }

                <button class="modal-btn primary" id="submitBugBtn">✨ 提交反馈</button>
            </div>
        </div>`;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.classList.add('active'), 10);
    
    const closeModal = () => {
        overlay.classList.remove('active');
        setTimeout(() => overlay.remove(), 200);
    };
    
    // 保存反馈到 localStorage
    const saveFeedback = () => {
        const desc = overlay.querySelector('#bugDesc').value.trim();
        if (!desc) {
            showToast('请填写问题描述', true);
            return false;
        }
        
        const contact = overlay.querySelector('#bugContact').value.trim() || '';
        const tag = overlay.querySelector('#bugTag').value.trim() || '未分类';
        
        // 构建反馈对象
        const feedbackItem = {
            id: 'fb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            desc: desc,
            contact: contact,
            tag: tag,
            attachments: [],
            timestamp: Date.now(),
            nickname: userProfile.nickname || '旅行者',
            version: '1.5.3'
        };
        
        // 读取现有的反馈列表
        const STORAGE_KEY = 'greyling_feedback_list';
        let feedbackList = [];
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                feedbackList = JSON.parse(stored);
                if (!Array.isArray(feedbackList)) feedbackList = [];
            } catch(e) { feedbackList = []; }
        }
        
        // 添加新反馈（最新在上方）
        feedbackList.unshift(feedbackItem);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(feedbackList));
        
        showToast(`${t('submitSuccess')}${contact ? '（' + contact + '）' : ''}`, false);
        closeModal();
        return true;
    };
    
    overlay.querySelector('#cancelBugBtn').onclick = closeModal;
    overlay.querySelector('.close-btn').onclick = closeModal;
    overlay.querySelector('#submitBugBtn').onclick = saveFeedback;
    overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
}

                <div class="setting-section">
                    <div class="info-card">
                        <h3>灰澪 AI</h3>
                        <p>${t('aboutDesc')}</p>
                        <p style="margin-top: 12px; font-size: 0.8rem;">${t('version')} 1.5.3</p>
                        <div style="margin-top: 16px;">
                            <button class="secondary-btn" id="checkUpdateBtn">🔍 ${t('checkUpdate')}</button>
                        </div>
                    </div>
                </div>`;
            contentDiv.querySelector('#checkUpdateBtn').onclick = () => { showToast(t('versionLatest')); };
        };
        
        const tabs = { general: renderGeneral, conversation: renderConversation, feedback: renderFeedback, about: renderAbout };
        
        if (isMobile) {
            const tabBtns = overlay.querySelectorAll('.settings-tab');
            const setTab = (tabId) => {
                tabBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
                if (tabs[tabId]) tabs[tabId]();
            };
            tabBtns.forEach(btn => btn.onclick = () => setTab(btn.dataset.tab));
            renderGeneral();
        } else {
            const navItems = overlay.querySelectorAll('.nav-item');
            const setTab = (tabId) => {
                navItems.forEach(nav => nav.classList.toggle('active', nav.dataset.tab === tabId));
                if (tabs[tabId]) tabs[tabId]();
            };
            navItems.forEach(nav => nav.onclick = () => setTab(nav.dataset.tab));
            renderGeneral();
        }
        
        const closeModal = () => { overlay.classList.remove('active'); setTimeout(() => overlay.remove(), 200); };
        overlay.querySelector('#closeSetBtn').onclick = closeModal;
        overlay.querySelector('.close-btn').onclick = closeModal;
        overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
    }
    
    // ==================== 发送消息函数 ====================
    function sendCurrentMessage() {
        const input = document.getElementById('chatInput');
        if (input.value.trim()) {
            sendMessageToAI(input.value.trim());
            input.value = "";
        }
    }
    
    // ==================== 事件绑定 ====================
    function bindEvents() {
        const sb = document.getElementById('sidebar'), so = document.getElementById('sidebarOverlay');
        let touchStartX = 0, touchStartY = 0;
        document.body.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        document.body.addEventListener('touchend', (e) => {
            if (window.innerWidth >= 768) return;
            let endX = e.changedTouches[0].clientX, endY = e.changedTouches[0].clientY;
            let deltaX = endX - touchStartX, deltaY = endY - touchStartY;
            if (deltaX > 50 && Math.abs(deltaX) > Math.abs(deltaY)) { sb.classList.add("open"); so.classList.add("active"); }
            if (sb.classList.contains('open') && deltaX < -30 && Math.abs(deltaX) > Math.abs(deltaY)) { sb.classList.remove("open"); so.classList.remove("active"); }
        });
        document.getElementById('menuToggleBtn').onclick = (e) => { e.stopPropagation(); if (window.innerWidth < 768) sb.classList.toggle("open"), so.classList.toggle("active"); };
        so.onclick = () => { sb.classList.remove("open"); so.classList.remove("active"); };
        
        document.getElementById('newChatBtn').onclick = () => {
            const id = "conv_" + Date.now();
            conversations[id] = { name: "新对话", messages: [{ role: "system", content: roleStyleDesc }, { role: "assistant", content: `你好呀，${userProfile.nickname}！` }], style: t('writing') };
            switchConv(id);
            saveConversations();
            if (window.innerWidth < 768) { sb.classList.remove("open"); so.classList.remove("active"); }
            showToast("新对话已创建");
        };
        
        const sendBtn = document.getElementById('sendMsgBtn');
        if (sendBtn) { sendBtn.onclick = () => sendCurrentMessage(); }
        
        const chatInput = document.getElementById('chatInput');
        chatInput.onkeypress = (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                sendCurrentMessage();
            }
        };
        
        const attachBtn = document.getElementById('attachBtn');
        const attachMenu = document.getElementById('attachMenu');
        attachBtn.onclick = (e) => {
            e.stopPropagation();
            attachMenu.classList.toggle('active');
        };
        document.addEventListener('click', (e) => {
            if (!attachBtn.contains(e.target) && !attachMenu.contains(e.target)) {
                attachMenu.classList.remove('active');
            }
        });
        
        document.getElementById('menuUploadImg').onclick = () => { handleFileUpload('image'); attachMenu.classList.remove('active'); };
        document.getElementById('menuUploadFile').onclick = () => { handleFileUpload('file'); attachMenu.classList.remove('active'); };
        
        document.getElementById('editStyleBtn').onclick = () => openStyleEditor();
        document.getElementById('funcTagLabel').onclick = () => openSystemSettings();
        
        const userMore = document.getElementById('userMoreBtn');
        userMore.onclick = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.dropdown-menu').forEach(x => x.remove());
            const m = document.createElement('div'); m.className = "dropdown-menu";
            m.innerHTML = `<div class="dropdown-item" act="profile">👤 ${t('editProfile')}</div><div class="dropdown-item" act="setting">⚙️ ${t('settings')}</div>`;
            document.body.appendChild(m);
            const r = e.target.getBoundingClientRect();
            let left = r.right - 150, top = r.bottom + 6;
            if (left < 10) left = 10;
            if (top + 100 > window.innerHeight) top = r.top - 100;
            m.style.left = left + "px"; m.style.top = top + "px";
            m.querySelectorAll('.dropdown-item').forEach(it => {
                it.onclick = () => {
                    if (it.getAttribute("act") === "profile") openEditProfile();
                    if (it.getAttribute("act") === "setting") openSystemSettings();
                    m.remove();
                };
            });
            setTimeout(() => { const cl = (ev) => { if (!m.contains(ev.target)) { m.remove(); document.removeEventListener("click", cl); } }; document.addEventListener("click", cl); }, 10);
        };
    }
    
    initDefault();
    bindEvents();
    saveUserProfile();
    console.log(`灰澪AI v1.5.3 已启动（滚动区域 + 简洁文件卡片 + 风趣协议）`);
</script>
</body>
</html>
